# Alacritty config file
[general]
live_config_reload = true
ipc_socket = false

[window]
title = "Alacritty"
dynamic_title = false
dimensions = { columns = 110, lines = 45 }

[font]
normal = { family = "MartianMonoNerdFontMono", style = "Regular" }
size = 11

[terminal]
shell = 'fish'

[mouse]
hide_when_typing = true

[bell]
color = "#ebb484"
animation = "EaseOut"
duration = 0

[colors]
selection = { text = "CellForeground", background = "#333738" }

# Vague for Alacritty
# -------------------
# Theme Author: vague2k <ilovedrawing056@gmail.com>
# Ported by:	skewb1k <skewb1kunix@gmail.com>
# License:  	MIT License
# Upstream: 	https://github.com/vague2k/vague.nvim/blob/main/extras/alacritty/vague.toml
[colors.primary]
background = '#141415'
foreground = '#cdcdcd'

[colors.normal]
black = '#252530'
red = '#d8647e'
green = '#7fa563'
yellow = '#f3be7c'
blue = '#6e94b2'
magenta = '#bb9dbd'
cyan = '#aeaed1'
white = '#cdcdcd'

[colors.bright]
black = '#606079'
red = '#e08398'
green = '#99b782'
yellow = '#f5cb96'
blue = '#8ba9c1'
magenta = '#c9b1ca'
cyan = '#bebeda'
white = '#d7d7d7'


[keyboard]
bindings = [
    # window management
    { key = "N", mods = "Control|Alt", action = "CreateNewWindow" },
    # vi mode
    { key = "M", mods = "Control|Alt", action = "ToggleViMode" },
    { key = "q", mode = "Vi", action = "ToggleViMode" },
    # vi mode, work around some keyboard layout issues
    { key = "$", mode = "Vi", action = "Last" },
    { key = 13, mode = "Vi", action = "FirstOccupied" }, # binds ^
    # search mode
    { key = "r", mods = "Control|Shift", action = "SearchBackward" },
    { key = "q", mode = "Search", action = "SearchCancel" },
    { key = "c", mode = "Search", action = "SearchClear" },
    # fix numpad behavior (for nvim)
    { key = "Numpad1", chars = "1" },
    { key = "Numpad2", chars = "2" },
    { key = "Numpad3", chars = "3" },
    { key = "Numpad4", chars = "4" },
    { key = "Numpad5", chars = "5" },
    { key = "Numpad6", chars = "6" },
    { key = "Numpad7", chars = "7" },
    { key = "Numpad8", chars = "8" },
    { key = "Numpad9", chars = "9" },
]
