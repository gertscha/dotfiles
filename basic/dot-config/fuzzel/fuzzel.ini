# output=<not set>
namespace=launcher
layer=overlay
font=JetBrainsMono:size=12
use-bold=no
dpi-aware=auto
prompt="❯ "
# placeholder=
# icon-theme=default
icons-enabled=yes
hide-before-typing=no
# fields=filename,name,generic
password-character=*
match-mode=fzf
filter-desktop=no
sort-result=yes
match-counter=no
# delayed-filter-ms=300
# delayed-filter-limit=500
show-actions=no
terminal=foot -a '{cmd}' -T '{cmd}' {cmd}
# launch-prefix=<not set>
list-executables-in-path=no

anchor=center
lines=20
minimal-lines=yes
width=60
tabs=4
horizontal-pad=12
vertical-pad=8
inner-pad=8

# scaling-filter=box
# image-size-ratio=0.5
# gamma-correct-blending=no
# line-height=<use font metrics>
# letter-spacing=0

enable-mouse=no
keyboard-focus=exclusive
exit-on-keyboard-focus-loss=yes
auto-select=no
# cache=<not set> # $XDG_CACHE_HOME/fuzzel is default

# render-workers=<number of logical CPUs>
# match-workers=<number of logical CPUs>

[colors]
background=141415ff
text=cdcdcdff
prompt=f3be7cff
message=7e98e8ff
placeholder=aeaed1ff
input=cdcdcdff
match=f3be7cff
selection=252530ff
selection-text=cdcdcdff
selection-match=f3be7cff
counter=606079ff
border=606079ff

[border]
width=2
radius=0
selection-radius=0

[dmenu]
mode=text
exit-immediately-if-empty=no

[key-bindings]
cancel=Escape Control+e Control+c
# execute=Return KP_Enter Control+y
# execute-or-next=Tab
# execute-input=Shift+Return Shift+KP_Enter
# cursor-left=Left Control+b
# cursor-left-word=Control+Left Mod1+b
# cursor-right=Right Control+f
# cursor-right-word=Control+Right Mod1+f
# cursor-home=Home Control+a
cursor-end=End Control+g
# delete-line=Control+Shift+BackSpace
# delete-prev=BackSpace Control+h
# delete-prev-word=Mod1+BackSpace Control+BackSpace Control+w
# delete-line-backward=Control+u
# delete-next=Delete KP_Delete Control+d
# delete-next-word=Mod1+d Control+Delete Control+KP_Delete
# delete-line-forward=Control+k
# prev=Up Control+p
# prev-with-wrap=ISO_Left_Tab
# prev-page=Page_Up KP_Page_Up
# next=Down Control+n
# next-with-wrap=none
# next-page=Page_Down KP_Page_Down
# expunge=Shift+Delete
clipboard-paste=Control+v Shift+Control+v XF86Paste
# primary-paste=Shift+Insert Shift+KP_Insert

# custom-N: *dmenu mode only*. Like execute, but with a non-zero
# exit-code; custom-1 exits with code 10, custom-2 with 11, custom-3
# with 12, and so on.

# custom-1=Mod1+1
# custom-2=Mod1+2
# custom-3=Mod1+3
# custom-4=Mod1+4
# custom-5=Mod1+5
# custom-6=Mod1+6
# custom-7=Mod1+7
# custom-8=Mod1+8
# custom-9=Mod1+9
# custom-10=Mod1+0
