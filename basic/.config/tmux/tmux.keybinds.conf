# remap prefix
set -g prefix C-f
unbind C-b

# switch panes 
bind h select-pane -L
unbind l # default: switch to previous active pane
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# alternate bidning to enter copy mode (default is '[')
bind y copy-mode 

