# Config for the drcula theme
# https://draculatheme.com/tmux

# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage,
# network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn,
# weather, time, mpc, kubernetes-context, synchronize-panes
set -g @dracula-plugins "attacked-clients ssh-session network-ping"

# available colors: white, gray, dark_gray, light_purple, dark_purple, cyan, green,
# orange, red, pink, yellow
# set -g @dracula-[plugin-name]-colors "[background] [foreground]"
set -g @dracula-attached-clients-colors "dark_gray white"
set -g @dracula-ssh-session-colors "orange gray"
set -g @dracula-network-ping-colors "dark_gray white"

# powerline symboly ,for left
# set -g @dracula-show-left-sep 
# set -g @dracula-show-right-sep 

# window flags
set -g @dracula-show-flags true

# it can accept `hostname` (full hostname), `session`, `shortname` (short name), `smiley`, 
# window`, or any character. 
set -g @dracula-show-left-icon 󰣩

