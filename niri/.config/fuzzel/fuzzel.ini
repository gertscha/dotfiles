[main]
font = MartianMono:size=12
dpi-aware = auto

prompt = "➤ "
use-bold = false
icons-enabled = false
match-counter = no

anchor = center
lines = 12
width = 25
inner-pad = 2
vertical-pad = 10
horizontal-pad = 20

delayed-filter-limit = 1000
delayed-filter-ms = 300

[border]
width = 2
radius = 8

[colors]
background = 141415FF
border = 878787FF
text = CDCDCDFF
prompt = E8B589FF
input = CDCDCDFF
match = 7FA563FF
placeholder = 9ECE6AFF
selection = 252530FF
selection-text = CDCDCDFF
selection-match = 7FA563FF

[key-bindings]
delete-line-forward = none
next = Down Control+j Control+n
prev = Up Control+k Control+p
next-page = Shift+d
prev-page = Shift+u
