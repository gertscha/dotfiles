# minor adjustments were made

[cursor]
style=block
unfocused-style=hollow
# blink=no
# blink-rate=500
# beam-thickness=1.5
# underline-thickness=<font underline thickness>

[colors]
alpha=1.0
# alpha-mode=default # Can be `default`, `matching` or `all`
background=141415
foreground=cdcdcd

# cursor=141415 cdcdcd

flash=f3be7c
flash-alpha=0.5

## Normal/regular colors (color palette 0-7)
regular0=252530
regular1=d8647e
regular2=7fa563
regular3=f3be7c
regular4=6e94b2
regular5=bb9dbd
regular6=aeaed1
regular7=cdcdcd

## Bright colors (color palette 8-15)
